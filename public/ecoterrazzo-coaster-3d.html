<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOTERRAZZO — Recycled Aggregate Coaster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4efe6; /* Warm off-white / kraft-paper tone */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        /* Minimal Corner Caption */
        .caption {
            position: absolute;
            top: 28px;
            left: 32px;
            z-index: 10;
            pointer-events: none;
            user-select: none;
        }
        .caption h1 {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            color: #4a4742;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .caption p {
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: #8c857b;
            text-transform: uppercase;
        }
    </style>
    <!-- Three.js and OrbitControls via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container">
        <!-- Small minimal caption -->
        <div class="caption">
            <h1>ECOTERRAZZO</h1>
            <p>Recycled Aggregate Coaster</p>
        </div>
    </div>

    <script>
        // ====================================================================
        // ECOTERRAZZO COASTER — THREE.JS INTERACTIVE 3D MODEL
        // ====================================================================

        (function() {
            'use strict';

            const container = document.getElementById('canvas-container');

            // 1. SCENE SETUP & BACKGROUND
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf4efe6); // Warm off-white / kraft paper tone

            // 2. CAMERA SETUP (Gentle 3/4 top-down angle)
            const camera = new THREE.PerspectiveCamera(
                35, 
                window.innerWidth / window.innerHeight, 
                0.1, 
                1000
            );
            camera.position.set(0, 14, 12);
            camera.lookAt(0, 0, 0);

            // 3. RENDERER SETUP
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // 4. ORBIT CONTROLS WITH AUTO-ROTATE & IDLE RESUME
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.02; // Keep camera above ground level
            controls.minDistance = 6;
            controls.maxDistance = 25;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.2;

            let idleTimeout = null;
            function resetIdleTimer() {
                controls.autoRotate = false;
                clearTimeout(idleTimeout);
                idleTimeout = setTimeout(() => {
                    controls.autoRotate = true;
                }, 3500); // Resume auto-rotate after 3.5s inactivity
            }
            controls.addEventListener('start', resetIdleTimer);
            controls.addEventListener('change', () => {
                if (!controls.autoRotate) resetIdleTimer();
            });

            // 5. LIGHTING (Soft, flat, mostly shadow-free)
            const ambientLight = new THREE.AmbientLight(0xfefbfa, 0.85);
            scene.add(ambientLight);

            const softKeyLight = new THREE.DirectionalLight(0xfff8f0, 0.65);
            softKeyLight.position.set(6, 12, 8);
            softKeyLight.castShadow = true;
            softKeyLight.shadow.mapSize.width = 1024;
            softKeyLight.shadow.mapSize.height = 1024;
            softKeyLight.shadow.camera.near = 0.5;
            softKeyLight.shadow.camera.far = 30;
            softKeyLight.shadow.camera.left = -6;
            softKeyLight.shadow.camera.right = 6;
            softKeyLight.shadow.camera.top = 6;
            softKeyLight.shadow.camera.bottom = -6;
            softKeyLight.shadow.radius = 4; // Soft contact shadow blur
            scene.add(softKeyLight);

            const fillLight = new THREE.DirectionalLight(0xe8e2d8, 0.35);
            fillLight.position.set(-8, 8, -6);
            scene.add(fillLight);

            // 6. GROUND SHADOW RECEIVER (Soft contact shadow floor)
            const shadowFloorGeo = new THREE.PlaneGeometry(30, 30);
            const shadowFloorMat = new THREE.ShadowMaterial({ opacity: 0.12 });
            const shadowFloor = new THREE.Mesh(shadowFloorGeo, shadowFloorMat);
            shadowFloor.rotation.x = -Math.PI / 2;
            shadowFloor.position.y = -0.5;
            shadowFloor.receiveShadow = true;
            scene.add(shadowFloor);

            // ====================================================================
            // PROCEDURAL TERRAZZO CANVAS TEXTURE GENERATOR
            // ====================================================================
            function generateTerrazzoTexture() {
                const canvas = document.createElement('canvas');
                const size = 1024;
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                // Pale cement-resin base color
                ctx.fillStyle = '#e5dfd5';
                ctx.fillRect(0, 0, size, size);

                // Add subtle cement grain noise
                const imgData = ctx.getImageData(0, 0, size, size);
                const data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const noise = (Math.random() - 0.5) * 8;
                    data[i] = Math.min(255, Math.max(0, data[i] + noise));
                    data[i+1] = Math.min(255, Math.max(0, data[i+1] + noise));
                    data[i+2] = Math.min(255, Math.max(0, data[i+2] + noise));
                }
                ctx.putImageData(imgData, 0, 0);

                // Palette: moss green, warm sand, amber, forest-ink
                const speckleColors = [
                    '#3b5e43', // moss green
                    '#4d6953', // muted moss
                    '#cfa976', // warm sand
                    '#dfb46c', // amber
                    '#1e2d27', // forest-ink
                    '#293630', // dark forest
                    '#bfa178', // sand
                ];

                // Generate irregular polygonal speckles flush with surface
                const totalSpeckles = 180;

                for (let i = 0; i < totalSpeckles; i++) {
                    const cx = Math.random() * size;
                    const cy = Math.random() * size;
                    const numSides = 4 + Math.floor(Math.random() * 4); // 4 to 7 sides polygon
                    
                    // Varying sizes: mix of small (4-8px) and larger (14-30px)
                    const baseRadius = (Math.random() < 0.3) 
                        ? 14 + Math.random() * 18 
                        : 4 + Math.random() * 8;

                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(Math.random() * Math.PI * 2);

                    ctx.beginPath();
                    for (let s = 0; s < numSides; s++) {
                        const angle = (s / numSides) * Math.PI * 2;
                        const r = baseRadius * (0.65 + Math.random() * 0.7);
                        const px = Math.cos(angle) * r;
                        const py = Math.sin(angle) * r;
                        if (s === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();

                    ctx.fillStyle = speckleColors[Math.floor(Math.random() * speckleColors.length)];
                    ctx.fill();
                    ctx.restore();
                }

                return new THREE.CanvasTexture(canvas);
            }

            // ====================================================================
            // 7. BUILD ECOTERRAZZO COASTER GEOMETRY (~10 cm diameter, ~1 cm thick)
            // ====================================================================
            const coasterGroup = new THREE.Group();

            // Dimensions in 3D units (~5 unit radius = 10 cm, ~1 unit height = 1 cm)
            const radius = 4.8;
            const height = 0.95;
            const segments = 128;

            // Rounded / chamfered cylinder profile via LatheGeometry
            const profilePoints = [];
            const edgeRadius = 0.12;

            // Bottom chamfer
            profilePoints.push(new THREE.Vector2(0, 0));
            profilePoints.push(new THREE.Vector2(radius - edgeRadius, 0));
            profilePoints.push(new THREE.Vector2(radius, edgeRadius));

            // Side wall
            profilePoints.push(new THREE.Vector2(radius, height - edgeRadius));

            // Top chamfer
            profilePoints.push(new THREE.Vector2(radius - edgeRadius, height));
            profilePoints.push(new THREE.Vector2(0, height));

            const coasterGeo = new THREE.LatheGeometry(profilePoints, segments);

            // Add subtle edge chipping / imperfections on 2-3 spots along rim
            const posAttr = coasterGeo.attributes.position;
            const chipSpots = [
                { angle: Math.PI * 0.25, size: 0.15 },
                { angle: Math.PI * 1.1, size: 0.12 },
                { angle: Math.PI * 1.7, size: 0.18 }
            ];

            for (let i = 0; i < posAttr.count; i++) {
                const x = posAttr.getX(i);
                const y = posAttr.getY(i);
                const z = posAttr.getZ(i);

                const currentAngle = Math.atan2(z, x);
                const distFromCenter = Math.sqrt(x*x + z*z);

                // Check proximity to rim top/bottom edges
                if (distFromCenter > radius * 0.88) {
                    chipSpots.forEach(chip => {
                        let diff = Math.abs(currentAngle - chip.angle);
                        if (diff > Math.PI) diff = Math.PI * 2 - diff;

                        if (diff < chip.size) {
                            const factor = 1 - (diff / chip.size);
                            const indent = factor * 0.08 * (Math.sin(y * 20) * 0.5 + 0.5);
                            posAttr.setX(i, x * (1 - indent * 0.03));
                            posAttr.setZ(i, z * (1 - indent * 0.03));
                            posAttr.setY(i, y - indent * 0.04);
                        }
                    });
                }
            }
            coasterGeo.computeVertexNormals();

            // Matte Terrazzo Material
            const terrazzoTexture = generateTerrazzoTexture();
            terrazzoTexture.wrapS = THREE.RepeatWrapping;
            terrazzoTexture.wrapT = THREE.RepeatWrapping;

            const coasterMat = new THREE.MeshStandardMaterial({
                map: terrazzoTexture,
                roughness: 0.88,     // Matte finish, soft roughness
                metalness: 0.02,     // Non-metallic, handmade cement-resin feel
                bumpMap: terrazzoTexture,
                bumpScale: 0.005,    // Extremely subtle tactile surface texture
            });

            const coasterMesh = new THREE.Mesh(coasterGeo, coasterMat);
            coasterMesh.castShadow = true;
            coasterMesh.receiveShadow = true;
            coasterGroup.add(coasterMesh);

            // Center coaster on floor
            coasterGroup.position.set(0, -0.475, 0);
            scene.add(coasterGroup);

            // ====================================================================
            // 8. ANIMATION LOOP
            // ====================================================================
            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();

            // ====================================================================
            // 9. RESIZE HANDLER
            // ====================================================================
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

        })();
    </script>
</body>
</html>
